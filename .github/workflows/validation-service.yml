name: Validation Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'services/validation-service/**'
      - 'services/common-library/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/validation-service/**'
      - 'services/common-library/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and install common-library
        run: ./mvnw clean install -DskipTests
        working-directory: services/common-library

      - name: Build and Test with Maven
        run: ./mvnw clean verify
        working-directory: services/validation-service
