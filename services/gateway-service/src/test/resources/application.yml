spring:
  cloud:
    gateway:
      routes:
        - id: transaction-route
          # Forward to an in-process test stub instead of a real downstream so
          # SecurityIntegrationTest/RateLimiterIntegrationTest can exercise the
          # security and rate-limiter filters without a running backend.
          uri: forward:/internal/test/transactions
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"